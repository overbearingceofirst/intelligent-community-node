version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: ic_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-intelligent_community}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro # 可在初次运行时自动执行 init.sql（注意权限）
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: ic_app
    env_file:
      - .env.docker
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./data:/usr/src/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: ic_adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data:
